<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

    <h1>User Feedback Form</h1>
    <p>All forms of feedback are welcome. We appreciate your input!</p>
    <form id="feedbackForm" action="submit_feedback.php" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <div class="error" id="nameError" aria-live="polite"></div>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <div class="error" id="emailError" aria-live="polite"></div>

        <br><label for="feedback">Feedback:</label><br>
        <textarea id="feedback" name="feedback" rows="4" cols="50" maxlength="50" required></textarea>
        <div class="error" id="feedbackError" aria-live="polite"></div>
        <p> Character count: <span id = "charCount" > 0</span>/50</p>

            <button type="submit">Submit</button>
    </form>

    <div id="feedback-display">
        <h2>Submitted Feedback</h2>
    </div>

    <div id="customTooltip" role="tooltip" style="display: none; position: absolute; padding: 8px; background: rgba(0,0,0,0.8); color: white; border-radius: 4px; font-size: 0.9rem; z-index: 9999;">
      <!-- Tooltip text is set via JavaScript -->
    </div>

    <script src="cp_1.js"></script>
</body>
</html>
